dataset_id: wavestgate_wu_swarbrick_visium
description: >
  Wu/Swarbrick human breast cancer spatial transcriptomics atlas for
  independent Visium-scale validation. The Zenodo record contains processed raw
  and filtered count matrices, Space Ranger spatial files, H&E/annotation image
  documentation, and clinical/pathology metadata for six primary breast cancers
  profiled with 10x Genomics Visium.
root_dir: data/raw/wavestgate_wu_swarbrick_visium
sources:
