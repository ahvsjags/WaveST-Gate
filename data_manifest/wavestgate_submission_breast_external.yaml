dataset_id: wavestgate_submission_breast_external
description: >
  Additional public breast cancer spatial transcriptomics datasets for
  independent testing, cross-sample generalization, and baseline benchmarking.
  These are official 10x Genomics Visium datasets with full-resolution images,
  Space Ranger spatial bundles, expression matrices, analysis outputs, and
  summary artifacts where available.
root_dir: data/raw/wavestgate_submission_breast_external
sources:
  - name: 10x_breast_block_a_section_1
    role: independent_test
    url: https://www.10xgenomics.com/cn/datasets/human-breast-cancer-block-a-section-1-1-standard-1-0-0
    notes: Fresh frozen invasive ductal carcinoma, 3,813 spots under tissue.
  - name: 10x_breast_block_a_section_2
    role: independent_test
    url: https://www.10xgenomics.com/datasets/human-breast-cancer-block-a-section-2-1-standard-1-0-0
    notes: Fresh frozen invasive ductal carcinoma, 4,015 spots under tissue.
  - name: 10x_invasive_ductal_carcinoma_cd3_if
    role: external_generalization
    url: https://www.10xgenomics.com/datasets/invasive-ductal-carcinoma-stained-with-fluorescent-cd-3-antibody-1-standard-1-2-0
    notes: Fresh frozen breast IDC stained with DAPI and fluorescent CD3 antibody, 4,727 spots under tissue.
  - name: 10x_ffpe_dcis_invasive_carcinoma
    role: external_generalization
    url: https://www.10xgenomics.com/datasets/human-breast-cancer-ductal-carcinoma-in-situ-invasive-carcinoma-ffpe-1-standard-1-3-0
    notes: FFPE breast DCIS/invasive carcinoma with pathologist annotation image, 2,518 spots under tissue.
